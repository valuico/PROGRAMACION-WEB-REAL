<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAZE beauty | Official Site</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>

    <header class="main-header">
        <div class="logo-container">
            <a href="index.html">
                <img src="LOGO-removebg-preview.png" alt="HAZE Beauty Logo" class="haze-logo">
            </a>
        </div>

        <nav class="nav-menu">
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Skincare</a></li>
                <li><a href="#seccion-makeup">Makeup</a></li>
                <li><a href="#">Nosotros</a></li>
                <li><a href="#">Unite a la comunidad!</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="seccion-makeup" class="catalog-container">
            
            <aside class="sidebar">
                <h3>MAKEUP</h3>
                <ul>
                    <li><a href="javascript:void(0)" class="filter-btn" data-filter="all">Explorar Todo</a></li>
                    <li><a href="javascript:void(0)" class="filter-btn" data-filter="cara">Cara</a></li>
                    <li><a href="javascript:void(0)" class="filter-btn" data-filter="ojos">Ojos</a></li>
                    <li><a href="javascript:void(0)" class="filter-btn" data-filter="labios">Labios</a></li>
                </ul>
            </aside>

            <div class="products-grid">
                
                <div class="product-card cara">
                    <div class="product-img"><img src="base-maquillaje.png" alt="Haze Beauty Foundation"></div>
                    <div class="product-info">
                        <h4>Pro Filt'r Foundation</h4>
                        <p>Cara - Soft Matte Longwear</p>
                        
                        <div class="tone-selector">
                            <span class="tone-circle light" title="Light Porcelain"></span>
                            <span class="tone-circle medium" title="Medium Peach"></span>
                            <span class="tone-circle warm" title="Warm Amber"></span>
                            <span class="tone-circle deep" title="Deep Espresso"></span>
                        </div>

                        <span class="price">$40.000</span>
                        <button class="add-to-cart">Añadir al Carrito</button>
                    </div>
                </div>

                <div class="product-card labios">
                    <div class="product-img"><img src="gloss.jpg" alt="Gloss"></div>
                    <div class="product-info">
                        <h4>Gloss Bomb Stix</h4>
                        <p>Labios - High Shine</p>
                        <span>$44.911</span>
                    </div>
                </div>

                <div class="product-card ojos">
                    <div class="product-img"><img src="rimel.jpg" alt="Rimel"></div>
                    <div class="product-info">
                        <h4>Hella Thicc</h4>
                        <p>Ojos - Volumizing Mascara</p>
                        <span>$38.500</span>
                    </div>
                </div>

            </div>

        </section>
    </main>
    
</body>
</html>
